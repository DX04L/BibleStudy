<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>約翰福音系列 | Bible Study</title>
    
    <style>
        :root {
            --john-gold: #d4af37;
            --john-dark: #1a1a1a;
            --glass-white: rgba(255, 255, 255, 0.95);
            --text-main: #333;
            --fb-color: #1877f2;
            --line-color: #06c755;
        }

        html { 
            scroll-behavior: smooth; 
            height: 100%; /* Ensure html is full height */
        }

        body {
            font-family: 'Arial', 'Helvetica', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            margin: 0;
            padding: 0;
            color: var(--text-main);
            background-color: #1a1a1a; /* Dark base color */
            background-image: url('John-Believe_bg.jpg'); 
            background-repeat: no-repeat;
            background-position: center center;
            background-attachment: fixed;
            background-size: cover;
            line-height: 1.6;
            min-height: 100%; /* Ensure body can grow */
        }

        .overlay {
            background: rgba(0, 0, 0, 0.4); 
            /* FIX: Use min-height 100vh but allow it to grow with content */
            min-height: 100vh;
            width: 100%;
            padding: 60px 20px;
            box-sizing: border-box; /* Ensures padding doesn't add to width */
            display: flex;
            flex-direction: column;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        .header h1 { 
            font-family: 'Arial', sans-serif;
            font-size: clamp(2.4rem, 6vw, 3.8rem); 
            margin: 0; 
            color: #ffffff; 
            line-height: 1.1;
            letter-spacing: 8px;
            font-weight: 800;
            text-transform: uppercase;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .header p { 
            font-size: clamp(1rem, 2.5vw, 1.4rem); 
            margin-top: 15px;
            font-weight: 600;
            letter-spacing: 2px;
            color: #ffffff;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            width: 100%; /* Ensure container takes full width of parent */
        }

        .sermon-card {
            background: var(--glass-white);
            backdrop-filter: blur(8px);
            border-radius: 4px;
            padding: 35px;
            margin-bottom: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            border-left: 8px solid var(--john-gold);
            transition: all 0.3s ease;
            opacity: 0;
            transform: translateY(20px);
        }

        .sermon-card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .chapter-num {
            font-family: 'Arial', sans-serif;
            color: var(--john-gold);
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            display: block;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        .sermon-title {
            font-size: 1.6rem;
            margin: 0 0 12px 0;
            color: var(--john-dark);
            font-weight: 700;
        }

        .description {
            color: #666;
            font-size: 1.1rem;
            margin-bottom: 25px;
            border-bottom: 1px solid #eee;
            padding-bottom: 15px;
        }

        /* Actions Row Layout */
        .card-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        .play-button {
            font-family: 'Arial', sans-serif;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: var(--john-dark);
            color: var(--john-gold);
            text-decoration: none;
            padding: 14px 24px;
            border-radius: 2px;
            border: 1px solid var(--john-gold);
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 1px;
            transition: 0.3s;
            flex: 2;
            min-width: 150px;
            box-sizing: border-box;
            text-transform: uppercase;
        }

        .play-button:hover {
            background-color: var(--john-gold);
            color: white;
            transform: translateY(-2px);
        }

        /* Share Container & Buttons */
        .share-group {
            display: flex;
            gap: 8px;
            flex: 1;
            min-width: 150px;
        }

        .share-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex: 1;
            padding: 14px 10px;
            border-radius: 2px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: bold;
            color: white;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }

        .share-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .share-fb { background-color: var(--fb-color); }
        .share-line { background-color: var(--line-color); }
        .share-link { 
            background-color: #6c757d; 
            font-family: 'Arial', sans-serif;
        }

        .home-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 12px 22px;
            background-color: var(--john-dark);
            color: var(--john-gold);
            border: 1px solid var(--john-gold);
            border-radius: 4px;
            text-decoration: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            z-index: 1000;
            transition: all 0.3s ease;
            font-family: 'Arial', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .home-btn:hover {
            transform: translateY(-5px);
            background-color: var(--john-gold);
            color: white;
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }

        footer {
            text-align: center;
            color: #ffffff;
            padding: 60px 20px;
            margin-top: auto; /* Pushes footer to bottom if content is short */
            font-family: 'Arial', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 2px;
        }

        /* Toast Notification for Link Copy */
        .toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(0, 0, 0, 0.85);
            color: #fff;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 0.9rem;
            z-index: 2000;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s;
            opacity: 0;
            pointer-events: none;
            border: 1px solid var(--john-gold);
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        @media (max-width: 600px) {
            .home-btn { 
                bottom: 20px; 
                right: 20px; 
                padding: 10px 18px;
                font-size: 0.75rem;
            }
            .card-actions {
                flex-direction: column;
                align-items: stretch;
            }
            .share-group {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<a href="index.html" class="home-btn" title="Back to Main">HOME</a>

<div class="overlay">
    <header class="header">
        <h1>BELIEVE</h1>
        <p>約翰福音：Signs 神蹟 X I AM 真神</p>
    </header>

    <div class="container" id="sermon-container"></div>

    <footer>
        <p>&copy; BIBLE STUDY PORTAL | JOHN SERIES</p>
    </footer>
</div>

<div id="toast" class="toast">連結已複製到剪貼簿！</div>

<script>
    const sermons = [
        {
            chapter: "INTRODUCTION",
            title: "神蹟與真神 1｜介紹：使你能相信（約20:31）",
            desc: "明白約翰福音的核心目的：叫你們信耶穌是基督，是神的兒子。",
            url: "https://tinyurl.com/CLCSeniors-Sermon251127"
        },
        {
            chapter: "SIGN 01",
            title: "神蹟與真神 2｜神蹟一：好酒人生（約2:1-11）",
            desc: "人能相信，不只因為看見神蹟，而是因為經歷神的榮耀！",
            url: "https://tinyurl.com/CLCSeniors-Sermon260115"
        },
        {
            chapter: "SIGN 02",
            title: "神蹟與真神 3｜神蹟二：超越時空的信心（約4:43-54）",
            desc: "我們相信，是因為在信心的行動中認識了耶穌！",
            url: "https://tinyurl.com/CLCSeniors-Sermon260326"
        },
        {
            chapter: "SIGN 03",
            title: "神蹟與真神 4｜神蹟三：走出絕望的循環（約5:1-18）",
            desc: "信靠耶穌，不要相信傳說！走出絕望的循環，在如今還為你做事的基督裡安息。",
            url: "https://drive.google.com/file/d/1QcxrBmDi-HecUKg0jsnSdzsKmEzIVIbe/view?usp=sharing"
        },
        {
            chapter: "SIGN 04",
            title: "神蹟與真神 5｜神蹟四：不只是五餅二魚（約6:1-15）",
            desc: "Believe，因為耶穌要使你的生命豐富有餘，更要救你脫離罪的轄制！",
            url: "https://tinyurl.com/CLCSeniors-Sermon260514"
        }
    ];

    function renderSermons() {
        const container = document.getElementById('sermon-container');
        if (!container) return;

        container.innerHTML = sermons.map((s, index) => {
            // Encode titles and URLs for sharing
            const shareText = encodeURIComponent(`${s.title}\n${s.desc}\n`);
            const shareUrl = encodeURIComponent(s.url);
            
            // Generate Social Share Links
            const fbShareUrl = `https://www.facebook.com/sharer/sharer.php?u=${shareUrl}`;
            const lineShareUrl = `https://social-plugins.line.me/lineit/share?url=${shareUrl}&text=${shareText}`;

            return `
                <div class="sermon-card" style="transition-delay: ${index * 0.1}s">
                    <span class="chapter-num">${s.chapter}</span>
                    <h2 class="sermon-title">${s.title}</h2>
                    <p class="description">${s.desc}</p>
                    <div class="card-actions">
                        <a href="${s.url}" class="play-button" target="_blank">Listen Now</a>
                        <div class="share-group">
                            <a href="${fbShareUrl}" class="share-btn share-fb" target="_blank" title="分享到 Facebook">FB</a>
                            <a href="${lineShareUrl}" class="share-btn share-line" target="_blank" title="分享到 LINE">LINE</a>
                            <button class="share-btn share-link" onclick="copyLink('${s.url}')" title="複製音訊連結">LINK</button>
                        </div>
                    </div>
                </div>
            `;
        }).join('');

        setTimeout(() => {
            document.querySelectorAll('.sermon-card').forEach(card => card.classList.add('visible'));
        }, 100);
    }

    // Function to handle URL copying
    function copyLink(url) {
        navigator.clipboard.writeText(url).then(() => {
            showToast();
        }).catch(err => {
            // Fallback for older browsers
            const el = document.createElement('textarea');
            el.value = url;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            showToast();
        });
    }

    // Function to show custom toast message
    function showToast() {
        const toast = document.getElementById('toast');
        toast.classList.add('show');
        setTimeout(() => {
            toast.classList.remove('show');
        }, 2500);
    }

    window.onload = renderSermons;
</script>

</body>
</html>
