<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>約翰福音系列 | Bible Study</title>
    
    <style>
        :root {
            --john-gold: #d4af37;
            --john-dark: #1a1a1a;
            --glass-white: rgba(255, 255, 255, 0.95);
            --text-main: #333;
        }

        html { 
            scroll-behavior: smooth; 
            height: 100%; 
        }

        body {
            font-family: 'Arial', 'Helvetica', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            margin: 0;
            padding: 0;
            color: var(--text-main);
            background-color: #1a1a1a; 
            background-image: url('John-Believe_bg.jpg'); 
            background-repeat: no-repeat;
            background-position: center center;
            background-attachment: fixed;
            background-size: cover;
            line-height: 1.6;
            min-height: 100%; 
        }

        .overlay {
            background: rgba(0, 0, 0, 0.4); 
            min-height: 100vh;
            width: 100%;
            padding: 60px 20px;
            box-sizing: border-box; 
            display: flex;
            flex-direction: column;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        .header h1 { 
            font-family: 'Arial', sans-serif;
            font-size: clamp(2.4rem, 6vw, 3.8rem); 
            margin: 0; 
            color: #ffffff; 
            line-height: 1.1;
            letter-spacing: 8px;
            font-weight: 800;
            text-transform: uppercase;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .header p { 
            font-size: clamp(1rem, 2.5vw, 1.4rem); 
            margin-top: 15px;
            font-weight: 600;
            letter-spacing: 2px;
            color: #ffffff;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            width: 100%; 
        }

        .sermon-card {
            background: var(--glass-white);
            backdrop-filter: blur(8px);
            border-radius: 4px;
            padding: 35px;
            margin-bottom: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            border-left: 8px solid var(--john-gold);
            transition: all 0.3s ease;
            opacity: 0;
            transform: translateY(20px);
        }

        .sermon-card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .sermon-card:target {
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.8);
            border-left-color: #ffffff;
            background: #ffffff;
        }

        .chapter-num {
            font-family: 'Arial', sans-serif;
            color: var(--john-gold);
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            display: block;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        .sermon-title {
            font-size: 1.6rem;
            margin: 0 0 4px 0; 
            color: var(--john-dark);
            font-weight: 700;
        }

        .bible-verse {
            font-size: 1.2rem;
            color: #555;
            font-weight: 600;
            margin: 0 0 12px 0;
            display: block;
        }

        .description {
            color: #666;
            font-size: 1.1rem;
            margin-bottom: 25px;
            border-bottom: 1px solid #eee;
            padding-bottom: 15px;
            white-space: pre-line; /* Added to respect \n line breaks */
        }

        .audio-player-container {
            margin-top: 15px;
            width: 100%;
        }

        /* 支援多音軌卡片的內部排版樣式 */
        .audio-track-item {
            margin-bottom: 14px;
            width: 100%;
        }
        .audio-track-item:last-child {
            margin-bottom: 0;
        }

        .part-label {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--john-dark);
            display: block;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        /* Audio Wrapper & Custom Loading Indicator styles */
        .audio-wrapper {
            position: relative;
            width: 100%;
            transition: all 0.3s ease;
        }

        audio {
            width: 100%;
            outline: none;
            display: block;
        }

        .audio-loader {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(26, 26, 26, 0.5); /* Semi-transparent matching dark theme */
            backdrop-filter: blur(1px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none; 
            transition: opacity 0.2s ease;
            z-index: 5;
            border-radius: 4px;
        }

        /* Active buffering state */
        .audio-wrapper.is-loading .audio-loader {
            opacity: 1;
        }

        .audio-wrapper.is-loading {
            box-shadow: 0 0 12px rgba(214, 175, 55, 0.5);
        }

        .spinner-circle {
            width: 26px;
            height: 26px;
            border: 3px solid rgba(214, 175, 55, 0.2);
            border-top: 3px solid var(--john-gold);
            border-radius: 50%;
            animation: audio-spin 0.8s linear infinite;
        }

        @keyframes audio-spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .play-button {
            font-family: 'Arial', sans-serif;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: var(--john-dark);
            color: var(--john-gold);
            text-decoration: none;
            padding: 14px 24px;
            border-radius: 2px;
            border: 1px solid var(--john-gold);
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 1px;
            transition: 0.3s;
            width: 100%;
            box-sizing: border-box;
            text-transform: uppercase;
            cursor: pointer;
        }

        .play-button:hover {
            background-color: var(--john-gold);
            color: white;
            transform: translateY(-2px);
        }

        .autoplay-hint-btn {
            background-color: var(--john-dark);
            color: var(--john-gold);
            border: 1px solid var(--john-gold);
            animation: pulse 1.5s infinite;
        }
        .autoplay-hint-btn:hover {
            background-color: var(--john-gold);
            color: white;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(214, 175, 55, 0.7); }
            70% { transform: scale(1.02); box-shadow: 0 0 0 10px rgba(214, 175, 55, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(214, 175, 55, 0); }
        }

        .home-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 12px 22px;
            background-color: var(--john-dark);
            color: var(--john-gold);
            border: 1px solid var(--john-gold);
            border-radius: 4px;
            text-decoration: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            z-index: 1000;
            transition: all 0.3s ease;
            font-family: 'Arial', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .home-btn:hover {
            transform: translateY(-5px);
            background-color: var(--john-gold);
            color: white;
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }

        footer {
            text-align: center;
            color: #ffffff;
            padding: 60px 20px;
            margin-top: auto; 
            font-family: 'Arial', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 2px;
        }

        @media (max-width: 600px) {
            .home-btn { 
                bottom: 20px; 
                right: 20px; 
                padding: 10px 18px;
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>

<a href="index.html" class="home-btn" title="Back to Main">HOME</a>

<div class="overlay">
    <header class="header">
        <h1>BELIEVE</h1>
        <p>約翰福音：Signs 神蹟 X I AM 真神</p>
    </header>

    <div class="container" id="sermon-container"></div>

    <footer>
        <p>&copy; BIBLE STUDY PORTAL | JOHN SERIES</p>
    </footer>
</div>

<script>
    // 全面升級為與包含獨立 id 的 track 級架構
    const sermons = [
        {
            id: "intro",
            chapter: "INTRODUCTION",
            title: "神蹟與真神 1｜介紹：使你能相信",
            verse: "📖約20:31",
            desc: "明白約翰福音的核心目的：叫你們信耶穌是基督，是神的兒子。",
            links: [
                { id: "intro-a", label: "LISTEN NOW", url: "https://ia903107.us.archive.org/17/items/clcseniors-251127/CLCSeniors251127.mp3" }
            ]
        },
        {
            id: "sign1",
            chapter: "SIGN 01",
            title: "神蹟與真神 2｜神蹟一：好酒人生",
            verse: "📖約2:1-11",
            desc: "人能相信，不只因為看見神蹟，而是因為經歷神的榮耀！",
            links: [
                { id: "sign1-a", label: "LISTEN NOW", url: "https://ia903102.us.archive.org/2/items/clcseniors-260115/CLCSeniors260115.mp3" }
            ]
        },
        {
            id: "sign2",
            chapter: "SIGN 02",
            title: "神蹟與真神 3｜神蹟二：超越時空的信心",
            verse: "📖約4:43-54",
            desc: "我們相信，是因為在信心的行動中認識了耶穌！",
            links: [
                { id: "sign2-a", label: "LISTEN NOW", url: "https://ia600804.us.archive.org/17/items/clcseniors-260326/CLCSeniors260326.mp3" }
            ]
        },
        {
            id: "sign3",
            chapter: "SIGN 03",
            title: "神蹟與真神 4｜神蹟三：走出絕望的循環",
            verse: "📖約5:1-18",
            desc: "信靠耶穌，不要相信傳說！走出絕望的循環，在如今還為你做事的基督裡安息。",
            links: [
                { id: "sign3-a", label: "LISTEN NOW", url: "https://ia600604.us.archive.org/16/items/clcseniors-260423/CLCSeniors260423.mp3" }
            ]
        },
        {
            id: "sign4",
            chapter: "SIGN 04",
            title: "神蹟與真神 5｜神蹟四：不只是五餅二魚",
            verse: "📖約6:1-15",
            desc: "Believe，因為耶穌要使你的生命豐富有餘，更要救你脫離罪的轄制！",
            links: [
                { id: "sign4-a", label: "LISTEN NOW", url: "https://dn721501.ca.archive.org/0/items/clcseniors-260514/CLCSeniors260514.mp3" }
            ]
        },
        {
            id: "iam1",
            chapter: "I AM 01",
            title: "神蹟與真神 6｜真神宣告一：我就是生命的糧",
            verse: "📖約6:25-59",
            desc: "耶穌就是生命的糧，唯有祂常在我們裡面才有真滿足。",
            links: [
                { id: "iam1-a", label: "PART A", url: "https://ia601505.us.archive.org/29/items/clcseniors-260528/CLCSeniors260528.mp3" },
                { id: "iam1-b", label: "PART B", url: "https://ia903104.us.archive.org/7/items/clcseniors-260611/CLCSeniors260611.mp3" }
            ]
        },
        {
            id: "sign5",
            chapter: "SIGN 05",
            title: "神蹟與真神 7｜神蹟五：是我，不要怕！",
            verse: "📖約6:16-21",
            desc: "Believe The Great I AM，\n相信真神耶穌，讓祂接管你的人生，勝過生、死、成敗的一切恐懼！",
            links: [
                { id: "sign5-a", label: "LISTEN NOW", url: "https://ia601507.us.archive.org/21/items/clcseniors-260625_202606/CLCSeniors260625.mp3" }
            ]
        }
    ];

    function renderSermons() {
        const container = document.getElementById('sermon-container');
        if (!container) return;

        container.innerHTML = sermons.map((s, index) => {
            const actionElement = `
                <div class="audio-player-container" id="player-zone-${s.id}">
                    ${s.links.map((link) => {
                        const isMulti = s.links.length > 1;
                        const partLabelMarkup = isMulti ? `<span class="part-label">${link.label}</span>` : '';
                        
                        const cleanUrl = decodeURIComponent(link.url).trim();
                        const isAudio = cleanUrl.toLowerCase().endsWith('.mp3');
                        
                        return isAudio 
                            ? `
                            <div class="audio-track-item">
                                ${partLabelMarkup}
                                <div class="audio-wrapper">
                                    <audio id="audio-${link.id}" src="${link.url}" controls preload="metadata">
                                        Your browser does not support the audio element.
                                    </audio>
                                    <div class="audio-loader">
                                        <div class="spinner-circle"></div>
                                    </div>
                                </div>
                            </div>
                            `
                            : `
                            <div class="audio-track-item">
                                ${partLabelMarkup}
                                <a href="${link.url}" class="play-button" target="_blank">Listen Now</a>
                            </div>
                            `;
                    }).join('')}
                </div>`;

            return `
                <div class="sermon-card" id="${s.id}" style="transition-delay: ${index * 0.1}s">
                    <span class="chapter-num">${s.chapter}</span>
                    <h2 class="sermon-title">${s.title}</h2>
                    <span class="bible-verse">${s.verse}</span>
                    <p class="description">${s.desc}</p>
                    ${actionElement}
                </div>
            `;
        }).join('');

        setTimeout(() => {
            document.querySelectorAll('.sermon-card').forEach(card => card.classList.add('visible'));
            setupAudioEngine(); 
            handleAutoplayFromHash();
        }, 100);
    }

    function setupAudioEngine() {
        const audios = document.querySelectorAll('audio');
        
        audios.forEach(audio => {
            const wrapper = audio.closest('.audio-wrapper');
            if (!wrapper) return;

            const showLoader = () => wrapper.classList.add('is-loading');
            const hideLoader = () => wrapper.classList.remove('is-loading');

            audio.addEventListener('play', function() {
                audios.forEach(otherAudio => {
                    if (otherAudio !== audio) {
                        otherAudio.pause();
                    }
                });

                if (audio.dataset.androidFixing === "true") return;

                if (audio.readyState <= 1) {
                    audio.dataset.androidFixing = "true";
                    const currentPos = audio.currentTime;
                    showLoader();
                    
                    audio.load(); 
                    audio.currentTime = currentPos; 
                    
                    audio.play()
                        .then(() => { audio.dataset.androidFixing = "false"; })
                        .catch(() => { audio.dataset.androidFixing = "false"; });
                }
            });

            audio.addEventListener('seeking', showLoader);
            audio.addEventListener('waiting', showLoader);
            audio.addEventListener('stalled', showLoader);
            audio.addEventListener('loadstart', showLoader);

            audio.addEventListener('playing', hideLoader);
            audio.addEventListener('canplay', hideLoader);
            audio.addEventListener('pause', hideLoader);
            audio.addEventListener('seeked', hideLoader);
        });
    }

    function handleAutoplayFromHash() {
        const hash = window.location.hash;
        if (hash) {
            const targetId = hash.replace('#', '');
            
            let cardElement = document.getElementById(targetId);
            let audioElement = null;
            
            // 判斷錨點是直接指向字卡卡片還是特定音軌
            if (cardElement && cardElement.classList.contains('sermon-card')) {
                // 如果是指向卡片 (例如 #iam1)，預設抓卡片內的第一個播放器
                audioElement = cardElement.querySelector('audio');
            } else {
                // 如果是指向音軌 (例如 #iam1-b)，直接抓取對應音訊元件
                audioElement = document.getElementById(`audio-${targetId}`);
                if (audioElement) {
                    cardElement = audioElement.closest('.sermon-card');
                }
            }
            
            if (cardElement) {
                cardElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
                
                if (audioElement) {
                    const playerZone = cardElement.querySelector('.audio-player-container');
                    const oldBtn = document.getElementById(`hint-btn-${targetId}`);
                    if (oldBtn) oldBtn.remove();

                    audioElement.play().catch(error => {
                        console.log("自動播放被瀏覽器政策攔截，生成引導按鈕。");
                        
                        const hintBtn = document.createElement('button');
                        hintBtn.id = `hint-btn-${targetId}`;
                        hintBtn.className = 'play-button autoplay-hint-btn';
                        
                        // 根據傳入的 ID 動態決定提示按鈕上顯示的文字
                        let labelText = targetId.toUpperCase();
                        if (labelText.includes('IAM1-')) {
                            labelText = labelText.replace('IAM1-', 'PART ');
                        } else if (labelText === 'IAM1') {
                            labelText = 'PART A';
                        }
                        hintBtn.innerHTML = `▶ PLAY ${labelText}`;
                        
                        hintBtn.onclick = function() {
                            audioElement.play();
                            hintBtn.remove(); 
                        };
                        
                        if (playerZone) {
                            playerZone.insertBefore(hintBtn, playerZone.firstChild);
                        }
                    });
                }
            }
        }
    }

    window.onload = renderSermons;
    window.onhashchange = handleAutoplayFromHash;
</script>

</body>
</html>
