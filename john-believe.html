<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>約翰福音系列 | Bible Study</title>
    
    <style>
        :root {
            --john-gold: #d4af37;
            --john-dark: #1a1a1a;
            --glass-white: rgba(255, 255, 255, 0.95);
            --text-main: #333;
        }

        html { 
            scroll-behavior: smooth; 
            height: 100%; /* Ensure html is full height */
        }

        body {
            font-family: 'Arial', 'Helvetica', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            margin: 0;
            padding: 0;
            color: var(--text-main);
            background-color: #1a1a1a; /* Dark base color */
            background-image: url('John-Believe_bg.jpg'); 
            background-repeat: no-repeat;
            background-position: center center;
            background-attachment: fixed;
            background-size: cover;
            line-height: 1.6;
            min-height: 100%; /* Ensure body can grow */
        }

        .overlay {
            background: rgba(0, 0, 0, 0.4); 
            /* FIX: Use min-height 100vh but allow it to grow with content */
            min-height: 100vh;
            width: 100%;
            padding: 60px 20px;
            box-sizing: border-box; /* Ensures padding doesn't add to width */
            display: flex;
            flex-direction: column;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        .header h1 { 
            font-family: 'Arial', sans-serif;
            font-size: clamp(2.4rem, 6vw, 3.8rem); 
            margin: 0; 
            color: #ffffff; 
            line-height: 1.1;
            letter-spacing: 8px;
            font-weight: 800;
            text-transform: uppercase;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .header p { 
            font-size: clamp(1rem, 2.5vw, 1.4rem); 
            margin-top: 15px;
            font-weight: 600;
            letter-spacing: 2px;
            color: #ffffff;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            width: 100%; /* Ensure container takes full width of parent */
        }

        .sermon-card {
            background: var(--glass-white);
            backdrop-filter: blur(8px);
            border-radius: 4px;
            padding: 35px;
            margin-bottom: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            border-left: 8px solid var(--john-gold);
            transition: all 0.3s ease;
            opacity: 0;
            transform: translateY(20px);
        }

        .sermon-card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* 讓被指定的講道卡片有微微的發光提示效果 */
        .sermon-card:target {
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.8);
            border-left-color: #ffffff;
            background: #ffffff;
        }

        .chapter-num {
            font-family: 'Arial', sans-serif;
            color: var(--john-gold);
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            display: block;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        .sermon-title {
            font-size: 1.6rem;
            margin: 0 0 4px 0; /* 縮小底部間距，讓經文靠近標題 */
            color: var(--john-dark);
            font-weight: 700;
        }

        /* 新增：經文的專屬樣式 */
        .bible-verse {
            font-size: 1.2rem;
            color: #555;
            font-weight: 600;
            margin: 0 0 12px 0;
            display: block;
        }

        .description {
            color: #666;
            font-size: 1.1rem;
            margin-bottom: 25px;
            border-bottom: 1px solid #eee;
            padding-bottom: 15px;
        }

        /* 新增：內嵌音訊播放器樣式 */
        .audio-player-container {
            margin-top: 15px;
            width: 100%;
        }
        
        audio {
            width: 100%;
            outline: none;
        }

        .play-button {
            font-family: 'Arial', sans-serif;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: var(--john-dark);
            color: var(--john-gold);
            text-decoration: none;
            padding: 14px 24px;
            border-radius: 2px;
            border: 1px solid var(--john-gold);
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 1px;
            transition: 0.3s;
            width: 100%;
            box-sizing: border-box;
            text-transform: uppercase;
            cursor: pointer;
        }

        .play-button:hover {
            background-color: var(--john-gold);
            color: white;
            transform: translateY(-2px);
        }

        /* 新增：被瀏覽器擋住自動播放時顯示的提示按鈕 */
        .autoplay-hint-btn {
            background-color: #e67e22;
            color: white;
            border: none;
            animation: pulse 1.5s infinite;
        }
        .autoplay-hint-btn:hover {
            background-color: #d35400;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(230, 126, 34, 0.7); }
            70% { transform: scale(1.02); box-shadow: 0 0 0 10px rgba(230, 126, 34, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(230, 126, 34, 0); }
        }

        .home-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 12px 22px;
            background-color: var(--john-dark);
            color: var(--john-gold);
            border: 1px solid var(--john-gold);
            border-radius: 4px;
            text-decoration: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            z-index: 1000;
            transition: all 0.3s ease;
            font-family: 'Arial', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .home-btn:hover {
            transform: translateY(-5px);
            background-color: var(--john-gold);
            color: white;
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }

        footer {
            text-align: center;
            color: #ffffff;
            padding: 60px 20px;
            margin-top: auto; /* Pushes footer to bottom if content is short */
            font-family: 'Arial', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 2px;
        }

        @media (max-width: 600px) {
            .home-btn { 
                bottom: 20px; 
                right: 20px; 
                padding: 10px 18px;
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>

<a href="index.html" class="home-btn" title="Back to Main">HOME</a>

<div class="overlay">
    <header class="header">
        <h1>BELIEVE</h1>
        <p>約翰福音：Signs 神蹟 X I AM 真神</p>
    </header>

    <div class="container" id="sermon-container"></div>

    <footer>
        <p>&copy; BIBLE STUDY PORTAL | JOHN SERIES</p>
    </footer>
</div>

<script>
    const sermons = [
        {
            id: "intro",
            chapter: "INTRODUCTION",
            title: "神蹟與真神 1｜介紹：使你能相信",
            verse: "📖約20:31",
            desc: "明白約翰福音的核心目的：叫你們信耶穌是基督，是神的兒子。",
            url: "https://tinyurl.com/CLCSeniors-Sermon251127"
        },
        {
            id: "sign1",
            chapter: "SIGN 01",
            title: "神蹟與真神 2｜神蹟一：好酒人生",
            verse: "📖約2:1-11",
            desc: "人能相信，不只因為看見神蹟，而是因為經歷神的榮耀！",
            url: "https://tinyurl.com/CLCSeniors-Sermon260115"
        },
        {
            id: "sign2",
            chapter: "SIGN 02",
            title: "神蹟與真神 3｜神蹟二：超越時空的信心",
            verse: "📖約4:43-54",
            desc: "我們相信，是因為在信心的行動中認識了耶穌！",
            url: "https://tinyurl.com/CLCSeniors-Sermon260326"
        },
        {
            id: "sign3",
            chapter: "SIGN 03",
            title: "神蹟與真神 4｜神蹟三：走出絕望的循環",
            verse: "📖約5:1-18",
            desc: "信靠耶穌，不要相信傳說！走出絕望的循環，在如今還為你做事的基督裡安息。",
            url: "https://drive.google.com/file/d/1QcxrBmDi-HecUKg0jsnSdzsKmEzIVIbe/view?usp=sharing"
        },
        {
            id: "sign4",
            chapter: "SIGN 04",
            title: "神蹟與真神 5｜神蹟四：不只是五餅二魚",
            verse: "📖約6:1-15",
            desc: "Believe，因為耶穌要使你的生命豐富有餘，更要救你脫離罪的轄制！",
            url: "https://dn721501.ca.archive.org/0/items/clcseniors-260514/CLCSeniors260514.mp3"
        },
        {
            id: "iam1-1",
            chapter: "I AM 01-1",
            title: "神蹟與真神 6｜神蹟四：真神宣告一：我就是生命的糧(上)",
            verse: "📖約6:25-59",
            desc: "耶穌就是生命的糧，生命的滿足從尋求祂開始。",
            url: "https://dn710902.ca.archive.org/0/items/CLCSeniors260528/CLCSeniors260528.mp3"
        }
    ];

    function renderSermons() {
        const container = document.getElementById('sermon-container');
        if (!container) return;

        container.innerHTML = sermons.map((s, index) => {
            const isAudio = s.url.endsWith('.mp3');
            
            const actionElement = isAudio 
                ? `<div class="audio-player-container" id="player-zone-${s.id}">
                    <audio id="audio-${s.id}" controls preload="auto">
                        <source src="${s.url}" type="audio/mpeg">
                        Your browser does not support the audio element.
                    </audio>
                   </div>`
                : `<a href="${s.url}" class="play-button" target="_blank">Listen Now</a>`;

            return `
                <div class="sermon-card" id="${s.id}" style="transition-delay: ${index * 0.1}s">
                    <span class="chapter-num">${s.chapter}</span>
                    <h2 class="sermon-title">${s.title}</h2>
                    <span class="bible-verse">${s.verse}</span>
                    <p class="description">${s.desc}</p>
                    ${actionElement}
                </div>
            `;
        }).join('');

        setTimeout(() => {
            document.querySelectorAll('.sermon-card').forEach(card => card.classList.add('visible'));
            handleAutoplayFromHash();
        }, 100);
    }

    function handleAutoplayFromHash() {
        const hash = window.location.hash;
        if (hash) {
            const targetId = hash.replace('#', '');
            const audioElement = document.getElementById(`audio-${targetId}`);
            const cardElement = document.getElementById(targetId);
            const playerZone = document.getElementById(`player-zone-${targetId}`);
            
            if (cardElement) {
                cardElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
                
                if (audioElement) {
                    const oldBtn = document.getElementById(`hint-btn-${targetId}`);
                    if (oldBtn) oldBtn.remove();

                    audioElement.play().catch(error => {
                        console.log("自動播放被瀏覽器政策攔截，生成引導按鈕。");
                        
                        // 建立修改為橘色發光且顯示 "▶ LISTEN NOW" 的引導按鈕
                        const hintBtn = document.createElement('button');
                        hintBtn.id = `hint-btn-${targetId}`;
                        hintBtn.className = 'play-button autoplay-hint-btn';
                        hintBtn.innerHTML = '▶ LISTEN NOW';
                        
                        hintBtn.onclick = function() {
                            audioElement.play();
                            hintBtn.style.display = 'none';
                        };
                        
                        playerZone.insertBefore(hintBtn, audioElement);
                    });
                }
            }
        }
    }

    window.onload = renderSermons;
    window.onhashchange = handleAutoplayFromHash;
</script>

</body>
</html>
