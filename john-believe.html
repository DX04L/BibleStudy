<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>約翰福音系列 | Bible Study</title>
    
    <style>
        :root {
            --john-gold: #d4af37;
            --john-dark: #1a1a1a;
            --glass-white: rgba(255, 255, 255, 0.95);
            --text-main: #333;
        }

        html { 
            scroll-behavior: smooth; 
            height: 100%; 
        }

        body {
            font-family: 'Arial', 'Helvetica', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            margin: 0;
            padding: 0;
            color: var(--text-main);
            background-color: #1a1a1a; 
            background-image: url('John-Believe_bg.jpg'); 
            background-repeat: no-repeat;
            background-position: center center;
            background-attachment: fixed;
            background-size: cover;
            line-height: 1.6;
            min-height: 100%; 
        }

        .overlay {
            background: rgba(0, 0, 0, 0.4); 
            min-height: 100vh;
            width: 100%;
            padding: 60px 20px;
            box-sizing: border-box; 
            display: flex;
            flex-direction: column;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        .header h1 { 
            font-family: 'Arial', sans-serif;
            font-size: clamp(2.4rem, 6vw, 3.8rem); 
            margin: 0; 
            color: #ffffff; 
            line-height: 1.1;
            letter-spacing: 8px;
            font-weight: 800;
            text-transform: uppercase;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .header p { 
            font-size: clamp(1rem, 2.5vw, 1.4rem); 
            margin-top: 15px;
            font-weight: 600;
            letter-spacing: 2px;
            color: #ffffff;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            width: 100%; 
        }

        .sermon-card {
            background: var(--glass-white);
            backdrop-filter: blur(8px);
            border-radius: 4px;
            padding: 35px;
            margin-bottom: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            border-left: 8px solid var(--john-gold);
            transition: all 0.3s ease;
            opacity: 0;
            transform: translateY(20px);
        }

        .sermon-card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .sermon-card:target {
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.8);
            border-left-color: #ffffff;
            background: #ffffff;
        }

        .chapter-num {
            font-family: 'Arial', sans-serif;
            color: var(--john-gold);
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            display: block;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        .sermon-title {
            font-size: 1.6rem;
            margin: 0 0 4px 0; 
            color: var(--john-dark);
            font-weight: 700;
        }

        .bible-verse {
            font-size: 1.2rem;
            color: #555;
            font-weight: 600;
            margin: 0 0 12px 0;
            display: block;
        }

        .description {
            color: #666;
            font-size: 1.1rem;
            margin-bottom: 25px;
            border-bottom: 1px solid #eee;
            padding-bottom: 15px;
        }

        .audio-player-container {
            margin-top: 15px;
            width: 100%;
        }

        /* 支援多音軌卡片的內部排版樣式 */
        .audio-track-item {
            margin-bottom: 14px;
            width: 100%;
        }
        .audio-track-item:last-child {
            margin-bottom: 0;
        }

        .part-label {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--john-dark);
            display: block;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        /* Audio Wrapper & Custom Loading Indicator styles */
        .audio-wrapper {
            position: relative;
            width: 100%;
            transition: all 0.3s ease;
        }

        audio {
            width: 100%;
            outline: none;
            display: block;
        }

        .audio-loader {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(26, 26, 26, 0.5); /* Semi-transparent matching dark theme */
            backdrop-filter: blur(1px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none; 
            transition: opacity 0.2s ease;
            z-index: 5;
            border-radius: 4px;
        }

        /* Active buffering state */
        .audio-wrapper.is-loading .audio-loader {
            opacity: 1;
        }

        .audio-wrapper.is-loading {
            box-shadow: 0 0 12px rgba(214, 175, 55, 0.5);
        }
