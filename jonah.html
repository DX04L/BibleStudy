<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>約拿書系列 | Bible Study</title>
    
    <style>
        :root {
            --gold-accent: #d4af37;
            --ocean-blue: #1a3a4a;
            --glass-bg: rgba(255, 255, 255, 0.94);
            --text-main: #2c3e50;
        }

        html { scroll-behavior: smooth; }

        body {
            /* 字體更新為 Arial */
            font-family: 'Arial', 'Helvetica', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            margin: 0;
            padding: 0;
            color: var(--text-main);
            background-color: #1a3a4a; 
            background-image: url('Jonah_bg.jpg'); 
            background-repeat: no-repeat;
            background-position: center center;
            background-attachment: fixed;
            background-size: cover;
            line-height: 1.6;
        }

        .overlay {
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.7));
            min-height: 100vh;
            padding: 40px 20px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            text-shadow: 1px 2px 8px rgba(0,0,0,0.5);
        }

        .header h1 { 
            font-family: 'Arial', sans-serif;
            font-size: clamp(2.4rem, 6vw, 3.6rem); 
            margin: 0; 
            color: var(--gold-accent); 
            line-height: 1.1;
            letter-spacing: 6px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .header p { 
            font-size: clamp(1rem, 2.5vw, 1.3rem); 
            margin-top: 15px;
            font-weight: 300;
            letter-spacing: 1.5px;
            opacity: 0.95;
        }

        .container {
            max-width: 750px;
            margin: 0 auto;
        }

        .sermon-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            border-left: 8px solid var(--gold-accent);
            transition: all 0.3s ease;
            opacity: 0;
            transform: translateY(15px);
        }

        .sermon-card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* 讓被指定的講道卡片有微微的發光提示效果 */
        .sermon-card:target {
            box-shadow: 0 0 25px rgba(214, 175, 55, 0.8);
            border-left-color: #ffffff;
            background: #ffffff;
        }

        .chapter-num {
            font-family: 'Arial', sans-serif;
            color: var(--ocean-blue);
            font-weight: 800;
            font-size: 0.75rem;
            text-transform: uppercase;
            display: block;
            margin-bottom: 5px;
            letter-spacing: 1.5px;
        }

        .sermon-title {
            font-size: 1.5rem;
            margin: 0 0 4px 0; /* 縮小底部間距，讓經文靠近標題 */
            color: #111;
            font-weight: 700;
        }

        /* 新增：經文的專屬樣式 */
        .bible-verse {
            font-size: 1.15rem;
            color: #555;
            font-weight: 600;
            margin: 0 0 12px 0;
            display: block;
        }

        .description {
            color: #555;
            font-size: 1.05rem;
            margin-bottom: 25px;
        }

        /* 新增：內嵌音訊播放器樣式 */
        .audio-player-container {
            margin-top: 15px;
            width: 100%;
        }
        
        audio {
            width: 100%;
            outline: none;
        }

        .play-button {
            font-family: 'Arial', sans-serif;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: var(--ocean-blue);
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 50px;
            border: 1px solid transparent;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
            width: 100%;
            box-sizing: border-box;
            text-transform: uppercase;
            cursor: pointer;
        }

        .play-button:hover {
            background-color: #2c5d75;
            box-shadow: 0 5px 15px rgba(26, 58, 74, 0.4);
            transform: scale(1.02);
        }

        /* 新增：被瀏覽器擋住自動播放時顯示的提示按鈕（維持原色系海洋藍與金邊） */
        .autoplay-hint-btn {
            background-color: var(--ocean-blue);
            color: var(--gold-accent);
            border: 1px solid var(--gold-accent);
            animation: pulse 1.5s infinite;
        }
        .autoplay-hint-btn:hover {
            background-color: var(--gold-accent);
            color: white;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(214, 175, 55, 0.7); }
            70% { transform: scale(1.02); box-shadow: 0 0 0 10px rgba(214, 175, 55, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(214, 175, 55, 0); }
        }

        /* 簡約文字懸浮回首頁按鈕 */
        .home-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 12px 22px;
            background-color: var(--ocean-blue);
            color: var(--gold-accent);
            border: 1px solid var(--gold-accent);
            border-radius: 4px;
            text-decoration: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            z-index: 1000;
            transition: all 0.3s ease;
            font-family: 'Arial', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .home-btn:hover {
            transform: translateY(-5px);
            background-color: var(--gold-accent);
            color: white;
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }

        footer {
            text-align: center;
            color: white;
            padding: 50px 20px;
            font-family: 'Arial', sans-serif;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        @media (max-width: 600px) {
            .home-btn { 
                bottom: 20px; 
                right: 20px; 
                padding: 10px 18px;
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>

<a href="index.html" class="home-btn" title="Back to Main">HOME</a>

<div class="overlay">
    <header class="header">
        <h1>JONAH</h1>
        <p>約拿書：愛與給人機會的神</p>
    </header>

    <div class="container" id="sermon-container"></div>

    <footer>
        <p>&copy; BIBLE STUDY PORTAL | JONAH SERIES</p>
    </footer>
</div>

<script>
    // 1. 已新增對應的 id 屬性 (jonah1 ~ jonah4)
    const sermons = [
        {
            id: "jonah1",
            chapter: "SERIES 01",
            title: "約拿書 1｜三十六計，走為下策",
            verse: "📖拿1:1-17",
            desc: "違背神旨意的結果就是遇見風暴，也帶給身邊的人風暴。",
            url: "https://ia801808.us.archive.org/17/items/clcseniors-221012/CLCSeniors221012%20.mp3"
        },
        {
            id: "jonah2",
            chapter: "SERIES 02",
            title: "約拿書 2｜跑的了先知，躲不了神",
            verse: "📖拿2:1-10",
            desc: "神有絕對主權，救恩出於耶和華！",
            url: "https://dn710106.ca.archive.org/0/items/clcseniors-221109/CLCSeniors221109.mp3"
        },
        {
            id: "jonah3",
            chapter: "SERIES 03",
            title: "約拿書 3｜呼召不改，本性要移",
            verse: "📖拿3:1-10",
            desc: "行動帶來恢復，悔改就帶來恩典。",
            url: "https://dn711100.ca.archive.org/0/items/clcseniors-230628/CLCSeniors230628.mp3"
        },
        {
            id: "jonah4",
            chapter: "SERIES 04",
            title: "約拿書 4｜坐山觀審判，唯有神慈愛",
            verse: "📖拿4:1-11",
            desc: "上帝「愛」一切他所造的並給人悔改的「機會」，要藉著福音傳給萬民。",
            url: "https://dn711201.ca.archive.org/0/items/clcseniors-230726/CLCSeniors230726%20.mp3"
        }
    ];

    function renderSermons() {
        const container = document.getElementById('sermon-container');
        if (!container) return;
        
        container.innerHTML = sermons.map((s, index) => {
            // 2. 透過內建解碼與清除前後空格，精準識別含編碼或空格的 .mp3 結尾
            const cleanUrl = decodeURIComponent(s.url).trim();
            const isAudio = cleanUrl.toLowerCase().endsWith('.mp3');
            
            const actionElement = isAudio 
                ? `<div class="audio-player-container" id="player-zone-${s.id}">
                    <audio id="audio-${s.id}" controls preload="auto">
                        <source src="${s.url}" type="audio/mpeg">
                        Your browser does not support the audio element.
                    </audio>
                   </div>`
                : `<a href="${s.url}" class="play-button" target="_blank">Listen Now</a>`;

            return `
                <div class="sermon-card" id="${s.id}" style="transition-delay: ${index * 0.1}s">
                    <span class="chapter-num">${s.chapter}</span>
                    <h2 class="sermon-title">${s.title}</h2>
                    <span class="bible-verse">${s.verse}</span>
                    <p class="description">${s.desc}</p>
                    ${actionElement}
                </div>
            `;
        }).join('');

        setTimeout(() => {
            document.querySelectorAll('.sermon-card').forEach(card => card.classList.add('visible'));
            handleAutoplayFromHash();
        }, 100);
    }

    // 3. 網址 Hash 自動播放引導與平滑滾動機制
    function handleAutoplayFromHash() {
        const hash = window.location.hash;
        if (hash) {
            const targetId = hash.replace('#', '');
            const audioElement = document.getElementById(`audio-${targetId}`);
            const cardElement = document.getElementById(targetId);
            const playerZone = document.getElementById(`player-zone-${targetId}`);
            
            if (cardElement) {
                cardElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
                
                if (audioElement) {
                    const oldBtn = document.getElementById(`hint-btn-${targetId}`);
                    if (oldBtn) oldBtn.remove();

                    audioElement.play().catch(error => {
                        console.log("自動播放被瀏覽器政策攔截，生成引導按鈕。");
                        
                        // 建立符合海洋藍與金邊主題色系且顯示 "▶ LISTEN NOW" 的呼吸燈提示按鈕
                        const hintBtn = document.createElement('button');
                        hintBtn.id = `hint-btn-${targetId}`;
                        hintBtn.className = 'play-button autoplay-hint-btn';
                        hintBtn.innerHTML = '▶ LISTEN NOW';
                        
                        hintBtn.onclick = function() {
                            audioElement.play();
                            hintBtn.style.display = 'none';
                        };
                        
                        playerZone.insertBefore(hintBtn, audioElement);
                    });
                }
            }
        }
    }

    window.onload = renderSermons;
    window.onhashchange = handleAutoplayFromHash;
</script>

</body>
</html>
